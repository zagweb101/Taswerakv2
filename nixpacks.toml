# ====================================================================
# Nixpacks config for Coolify (Node 22 + npm)
# Standardize on Node.js 22 + npm — no Bun in production.
# ====================================================================

[phases.setup]
nixPkgs = ["...", "openssl", "curl"]
nixLibs = ["...", "openssl"]

[phases.install]
cmds = ["npm ci --include=dev || npm install"]
dependsOn = ["setup"]

[phases.build]
cmds = [
    "npx prisma generate",
    "npm run build"
]
dependsOn = ["install"]

[start]
cmd = "npx prisma migrate deploy && HOSTNAME=0.0.0.0 PORT=3000 node .next/standalone/server.js"

[variables]
NODE_ENV = "production"
HOSTNAME = "0.0.0.0"
PORT = "3000"
NEXT_TELEMETRY_DISABLED = "1"
NPM_CONFIG_PRODUCTION = "false"
